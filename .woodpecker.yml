# Full git history required for atlas git_history.
# History cache lives on the agent at /var/lib/woodpecker/atlas-history-cache/{repo}/.
# Requires trusted repo (volumes). Create once on the agent: mkdir -p /var/lib/woodpecker/atlas-history-cache
clone:
  git:
    image: woodpeckerci/plugin-git
    settings:
      partial: false
      depth: 0

when:
  - event: push
    branch: main
  - event: pull_request
  - event: manual

steps:
  - name: restore-history-cache
    image: alpine:3
    volumes:
      - /var/lib/woodpecker/atlas-history-cache:/cache
    commands:
      - mkdir -p .atlas-cache/history
      - cp -a "/cache/${CI_REPO_NAME}/." .atlas-cache/history/ 2>/dev/null || true

  - name: build
    image: oven/bun:1
    commands:
      - bun install --frozen-lockfile
      - bun run validate
      - bun run build

  - name: save-history-cache
    image: alpine:3
    depends_on: [build]
    when:
      - event: push
        branch: main
    volumes:
      - /var/lib/woodpecker/atlas-history-cache:/cache
    commands:
      - mkdir -p "/cache/${CI_REPO_NAME}"
      - rm -rf "/cache/${CI_REPO_NAME:?}/"*
      - cp -a .atlas-cache/history/. "/cache/${CI_REPO_NAME}/"

  - name: deploy
    image: rclone/rclone:latest
    when:
      - event: push
        branch: main
    depends_on: [build]
    environment:
      DEPLOY_PASSWORD:
        from_secret: DEPLOY_SECRET
    commands:
      - rclone sync dist/ ":sftp,host=sftpgo.heterarchy.fyi,port=2222,user=heterarchy,pass=$DEPLOY_PASSWORD:/public/writings" -v

  - name: trigger-website
    image: woodpeckerci/plugin-trigger
    when:
      - event: push
        branch: main
    depends_on: [deploy]
    settings:
      repositories:
        - heterarchy-society/heterarchy.fyi
      token:
        from_secret: WOODPECKER_TOKEN
