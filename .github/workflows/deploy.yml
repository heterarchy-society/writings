name: Build and deploy writings to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:
  repository_dispatch:
    types: ["atlas-updated"]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Use latest Atlas
        if: github.event_name == 'repository_dispatch' || github.event_name == 'workflow_dispatch'
        env:
          ATLAS_REF: ${{ github.event.client_payload.atlas_ref || 'main' }}
        run: |
          rm -rf node_modules/@heterarchy/atlas
          bun add --force @heterarchy/atlas@github:heterarchy-society/atlas#${ATLAS_REF}

      - name: Show Atlas version
        run: |
          bunx heterarchy-atlas --help
          node -e "console.log(require('./node_modules/@heterarchy/atlas/package.json'))"

      - name: Build
        run: bun run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "dist/"

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  notify-web:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Trigger website rebuild
        run: |
          curl -fsS -X POST \
            -H "Authorization: Bearer ${{ secrets.WEB_DISPATCH_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/heterarchy-society/heterarchy.fyi/dispatches \
            -d '{"event_type":"dataset-updated","client_payload":{"dataset":"${{ github.event.repository.name }}","sha":"${{ github.sha }}"}}'
